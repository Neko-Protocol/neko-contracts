name: Stellar Contracts

on:
  push:
    branches: [main]
    paths:
      - "stellar-contracts/**"
      - ".github/workflows/stellar-contracts.yml"
  pull_request:
    paths:
      - "stellar-contracts/**"
      - ".github/workflows/stellar-contracts.yml"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            stellar-contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('stellar-contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust version
        run: rustc --version && cargo --version

      - name: Cache Stellar CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/stellar-cli
          key: stellar-cli-25.1.0-${{ runner.os }}

      - name: Install system deps for Stellar CLI
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: |
          if [ -f ~/.cache/stellar-cli/stellar ]; then
            cp ~/.cache/stellar-cli/stellar ~/.cargo/bin/stellar
            stellar version
          else
            cargo install --locked stellar-cli
            mkdir -p ~/.cache/stellar-cli
            cp ~/.cargo/bin/stellar ~/.cache/stellar-cli/
          fi

      - name: Build rwa-oracle WASM first (for contractimport!)
        run: |
          cargo build -p rwa-oracle --target wasm32-unknown-unknown --release
          mkdir -p target/wasm32v1-none/release
          cp target/wasm32-unknown-unknown/release/rwa_oracle.wasm target/wasm32v1-none/release/

      - name: Build contracts
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      - name: Build Soroban contracts (stellar contract build)
        run: stellar contract build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-contracts/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('stellar-contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
